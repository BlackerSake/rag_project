# 二级分类意图树
intents:
  A1:
    name: 退货/退款
    description: 覆盖破损、尺码拍错、质量问题、描述不符、运费承担、退货地址、退款到账等退货退款问题
    intent_id: A1
  A2:
    name: 换货/维修
    description: 覆盖换尺码换颜色、寄修到店维修、维修点查询、维修费用、备用机、换货物流等售后处理
    intent_id: A2
  A3:
    name: 物流状态
    description: 覆盖物流查询、修改地址、催发货、加急发货、驿站投放、物流停滞、丢件退回等配送问题
    intent_id: A3
  B1:
    name: 规格参数
    description: 覆盖尺寸重量、材质说明、颜色款式、兼容性、保修信息、包装清单等商品参数咨询
    intent_id: B1
  B2:
    name: 价格活动
    description: 覆盖优惠券、满减、保价、限时活动、会员价、拼团秒杀、运费券等价格促销问题
    intent_id: B2
  B3:
    name: 使用教程
    description: 覆盖安装步骤、绑定账号、功能设置、故障排除、清洁保养、升级重置等使用指导
    intent_id: B3
  C1:
    name: 登录注册
    description: 覆盖注册登录、密码修改、账号注销、手机号绑定、验证码、异常登录和账号安全问题
    intent_id: C1
  C2:
    name: 会员权益
    description: 覆盖积分查询、会员等级、权益领取、生日礼包、专属客服、会员活动和积分兑换问题
    intent_id: C2
  D1:
    name: 寒暄
    description: 包含你好、你是谁、谢谢
    intent_id: D1
  D2:
    name: 人工介入
    description: 包含投诉、转人工、电话联系
    intent_id: D2
